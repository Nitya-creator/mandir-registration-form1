<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <style>
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(90deg, #f59e0b, #ea580c, #b91c1c);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 32px;
      border-top: 6px solid #0b5cab;
    }
    .logo {
      text-align: center;
      font-size: 14px;
      color: #0b5cab;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    h1 {
      text-align: center;
      margin: 0 0 24px;
      color: #1f2937;
      font-size: 28px;
    }
    .row { margin-bottom: 16px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #374151;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
    }
    .phone-group {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 12px;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #0b5cab;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { opacity: 0.95; }
    small {
      color: #dc2626;
      min-height: 18px;
      display: block;
      margin-top: 4px;
    }
    @media (max-width: 700px) {
      .phone-group { grid-template-columns: 1fr; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div style="text-align:center; margin-bottom:12px; color:#ea580c; font-weight:700; font-size:13px; letter-spacing:1px;">Temple & Community Registration</div>

    <form onsubmit="submitForm(event)">
      <div class="row">
        <label>Full Name</label>
        <input type="text" id="name" required />
      </div>

      <div class="row">
        <label>Date of Birth</label>
        <input type="date" id="dob" required />
      </div>

      <div class="row">
        <label>Email</label>
        <input type="email" id="email" required />
      </div>

      <div class="row">
        <label>Phone Number</label>
        <div class="phone-group">
          <input type="text" id="phoneCountry" list="countryCodes" placeholder="Search country" required />
          <datalist id="countryCodes">
  <option value="🇳🇿 New Zealand (+64)">
  <option value="🇦🇺 Australia (+61)">
  <option value="🇺🇸 United States (+1)">
  <option value="🇬🇧 United Kingdom (+44)">
  <option value="🇮🇳 India (+91)">
  <option value="🇨🇦 Canada (+1)">
  <option value="🇿🇦 South Africa (+27)">
  <option value="🇸🇬 Singapore (+65)">
  <option value="🇦🇪 United Arab Emirates (+971)">
  <option value="🇫🇯 Fiji (+679)">
  <option value="🇳🇵 Nepal (+977)">
  <option value="🇵🇰 Pakistan (+92)">
  <option value="🇧🇩 Bangladesh (+880)">
  <option value="🇱🇰 Sri Lanka (+94)">
  <option value="🇲🇾 Malaysia (+60)">
  <option value="🇯🇵 Japan (+81)">
  <option value="🇨🇳 China (+86)">
  <option value="🇫🇷 France (+33)">
  <option value="🇩🇪 Germany (+49)">
  <option value="🇮🇹 Italy (+39)">
  <option value="🇪🇸 Spain (+34)">
  <option value="🇧🇷 Brazil (+55)">
  <option value="🇲🇽 Mexico (+52)">
</datalist>
          <input type="tel" id="phone" placeholder="Phone number" required />
        </div>
      </div>

      <div class="row">
        <label>Parent / Guardian Name</label>
        <input type="text" id="guardian" placeholder="Enter guardian name" required />
      </div>

      <div class="row">
        <label>Emergency Contact</label>
        <input type="tel" id="emergency" placeholder="Emergency phone number" required />
      </div>

      <div class="row">
        <label>Address</label>
        <input type="text" id="address" required />
      </div>

      <button type="submit">Submit Registration</button>
    </form>
  </div>

 <script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyEMIB4exeBKWfXtYy7yB21Rc2hrDhtd_SHiaTUs_gzOMlm4VxS3zt-_9MrGq00CfJa/exec";

const fieldMap = {
  name: document.getElementById("name"),
  dob: document.getElementById("dob"),
  email: document.getElementById("email"),
  phoneCountry: document.getElementById("phoneCountry"),
  phone: document.getElementById("phone"),
  guardian: document.getElementById("guardian"),
  emergency: document.getElementById("emergency"),
  address: document.getElementById("address")
};

function setError(fieldName, message) {
  const errorEl = document.getElementById(fieldName + "Error");
  if (errorEl) errorEl.textContent = message;
}

function clearErrors() {
  [
    "name",
    "dob",
    "email",
    "phone",
    "guardian",
    "emergency",
    "address"
  ].forEach(field => {
    const errorEl = document.getElementById(field + "Error");
    if (errorEl) errorEl.textContent = "";
  });
}

function isValidEmail(email) {
  return /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(email);
}

function validateForm() {
  clearErrors();
  let valid = true;

  if (fieldMap.name.value.trim().length < 2) {
    setError("name", "Enter a valid full name.");
    valid = false;
  }

  if (!fieldMap.dob.value) {
    setError("dob", "Enter date of birth.");
    valid = false;
  }

  if (!isValidEmail(fieldMap.email.value.trim())) {
    setError("email", "Enter a valid email.");
    valid = false;
  }

  if (!fieldMap.phoneCountry.value.trim()) {
    setError("phone", "Select a country.");
    valid = false;
  }

  if (!fieldMap.phone.value.trim()) {
    setError("phone", "Enter phone number.");
    valid = false;
  }

  if (!fieldMap.guardian.value.trim()) {
    setError("guardian", "Enter guardian name.");
    valid = false;
  }

  if (!fieldMap.emergency.value.trim()) {
    setError("emergency", "Enter emergency contact.");
    valid = false;
  }

  if (!fieldMap.address.value.trim()) {
    setError("address", "Enter address.");
    valid = false;
  }

  return valid;
}

function submitForm(e) {
  e.preventDefault();

  if (!validateForm()) return;

  const data = {
    name: fieldMap.name.value.trim(),
    dob: fieldMap.dob.value,
    email: fieldMap.email.value.trim(),
    country: fieldMap.phoneCountry.value,
    phone: fieldMap.phone.value.trim(),
    guardian: fieldMap.guardian.value.trim(),
    emergency: fieldMap.emergency.value.trim(),
    address: fieldMap.address.value.trim()
  };

  fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f4f6f8;
      padding:20px;
      font-family:Arial, sans-serif;
    ">
      <div style="
        width:100%;
        max-width:650px;
        background:white;
        border-radius:18px;
        box-shadow:0 10px 30px rgba(0,0,0,0.08);
        padding:40px;
        border-top:6px solid #0b5cab;
        text-align:center;
      ">
        <h1 style="color:#1f2937; margin-bottom:16px; font-size:32px;">
          Thank You 🙏
        </h1>

        <p style="color:#374151; font-size:18px; line-height:1.6;">
          Your registration has been submitted successfully.
        </p>

        <button onclick="location.reload()" style="
          margin-top:24px;
          padding:14px 24px;
          border:none;
          border-radius:10px;
          background:#0b5cab;
          color:white;
          font-size:16px;
          font-weight:bold;
          cursor:pointer;
        ">
          Submit Another Response
        </button>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
